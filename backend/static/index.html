<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AION-C</title>

<!-- Fonts: Inter para UI, JetBrains Mono para code -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- React 18 + Babel standalone (sin build step, sin npm) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- vis-network para grafos interactivos (Parte 12.4) -->
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a14;
  --bg-elevated: #11111c;
  --surface: #16162a;
  --surface2: #1d1d35;
  --surface3: #252544;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --purple: #a855f7;
  --purple2: #7c3aed;
  --purple-glow: rgba(168, 85, 247, 0.15);
  --border: #2a2a44;
  --border-light: #1f1f38;
  --input-bg: #1a1a2e;
  --green: #10b981;
  --orange: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.6);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
}
html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}
body {
  font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'cv11', 'ss01';
  font-size: 14px;
}

/* CRITICAL: React monta en #root, ese div necesita ser el flex container */
#root {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* Custom scrollbars — discretos y consistentes */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: var(--surface3);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--purple2);
}

/* ─── Sidebar (left) — 240px fijo ─── */
.sidebar {
  width: 240px;
  flex: 0 0 240px;
  background: var(--bg-elevated);
  border-right: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.sidebar-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border-light);
}
.sidebar-header h1 {
  font-size: 19px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--purple) 0%, #c084fc 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.sidebar-header .subtitle {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 500;
}
.new-chat-btn {
  margin: 12px 14px 6px;
  padding: 10px 12px;
  background: var(--purple2);
  color: white;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.15s ease;
  box-shadow: 0 2px 8px var(--purple-glow);
}
.new-chat-btn:hover {
  background: var(--purple);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--purple-glow);
}
.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
  min-height: 0;
}
.chat-item {
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin-bottom: 2px;
  font-size: 12.5px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.12s ease;
}
.chat-item:hover {
  background: var(--surface);
  color: var(--text);
}
.chat-item.active {
  background: var(--surface2);
  color: var(--text);
  border-left: 2px solid var(--purple);
  padding-left: 10px;
}
.lifecycle-badge {
  padding: 12px 16px;
  font-size: 10.5px;
  color: var(--text2);
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 500;
  flex: 0 0 auto;
}
.lifecycle-badge .dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 6px;
  box-shadow: 0 0 8px var(--green);
}

/* ─── Main column (center) — flex 1, llena el resto ─── */
.main {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  min-width: 0;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
}
.messages {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 28px 32px;
  min-height: 0;
}
.msg { margin-bottom: 22px; max-width: 78%; }
.msg.user { margin-left: auto; }
.msg.assistant { margin-right: auto; }
.msg-bubble {
  padding: 12px 16px;
  border-radius: var(--radius-lg);
  font-size: 14px;
  line-height: 1.55;
  word-wrap: break-word;
  white-space: pre-wrap;
  box-shadow: var(--shadow);
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--purple2) 0%, #6d28d9 100%);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant .msg-bubble {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border-light);
  border-bottom-left-radius: 4px;
}
.msg-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 6px;
  padding-left: 4px;
}
.motor-badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 700;
  color: white;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.level-badge {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Thinking indicator */
.thinking { padding: 12px 16px; background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius-lg); max-width: 60%; font-size: 12.5px; color: var(--text2); margin-bottom: 18px; display: flex; gap: 10px; align-items: center; }
.thinking .dots { display: inline-flex; gap: 3px; }
.thinking .dots span { width: 6px; height: 6px; background: var(--purple); border-radius: 50%; animation: blink 1.2s infinite; }
.thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

/* Per-message graph card */
.graph-card {
  margin-top: 8px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  background: var(--surface);
  overflow: hidden;
}
.graph-card-header {
  padding: 8px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text2);
  user-select: none;
  font-weight: 500;
  transition: background 0.12s;
}
.graph-card-header:hover {
  background: var(--surface2);
  color: var(--text);
}
.graph-card-header .arrow {
  transition: transform 0.2s;
  display: inline-block;
}
.graph-card.open .arrow {
  transform: rotate(90deg);
}
.graph-card-body {
  display: none;
  height: 320px;
  background: var(--bg);
  border-top: 1px solid var(--border-light);
}
.graph-card.open .graph-card-body {
  display: block;
}

/* Input area */
.input-area {
  padding: 18px 32px 22px;
  border-top: 1px solid var(--border-light);
  background: var(--bg-elevated);
  flex: 0 0 auto;
}
.input-wrap {
  display: flex;
  gap: 10px;
  max-width: 900px;
  margin: 0 auto;
}
.input-wrap input {
  flex: 1;
  padding: 13px 18px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: all 0.15s ease;
}
.input-wrap input::placeholder {
  color: var(--text3);
}
.input-wrap input:focus {
  border-color: var(--purple);
  box-shadow: 0 0 0 3px var(--purple-glow);
}
.input-wrap button {
  padding: 13px 24px;
  background: var(--purple2);
  color: white;
  border: none;
  border-radius: var(--radius-lg);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.15s ease;
}
.input-wrap button:hover:not(:disabled) {
  background: var(--purple);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--purple-glow);
}
.input-wrap button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.upload-btn {
  padding: 13px 16px;
  background: var(--surface);
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  font-size: 16px;
  transition: all 0.15s ease;
}
.upload-btn:hover {
  background: var(--surface2);
  color: var(--text);
}

/* ─── Right panel — 320px fijo ─── */
.panel {
  width: 320px;
  flex: 0 0 320px;
  background: var(--bg-elevated);
  border-left: 1px solid var(--border-light);
  overflow-y: auto;
  height: 100vh;
  min-height: 0;
}
.panel-section {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border-light);
}
.panel-section h3 {
  font-size: 10.5px;
  color: var(--purple);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-weight: 700;
}

.score-bar {
  display: flex;
  align-items: center;
  margin-bottom: 7px;
  font-size: 11.5px;
  gap: 8px;
}
.score-bar .name {
  width: 60px;
  color: var(--text2);
  font-weight: 500;
}
.score-bar .bar-bg {
  flex: 1;
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border-light);
}
.score-bar .bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.score-bar .val {
  width: 36px;
  text-align: right;
  color: var(--text2);
  font-size: 10.5px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

.mem-entry {
  font-size: 11.5px;
  color: var(--text2);
  padding: 7px 0;
  border-bottom: 1px solid var(--border-light);
  line-height: 1.4;
}
.mem-entry:last-child {
  border-bottom: none;
}
.mem-entry .key {
  color: var(--purple);
  font-weight: 600;
}

.tool-log-entry {
  font-size: 11px;
  color: var(--text2);
  padding: 5px 0;
  font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
  line-height: 1.4;
  word-break: break-all;
}
.tool-log-entry .action {
  color: var(--blue);
  font-weight: 600;
}

.plan-step {
  font-size: 12px;
  padding: 6px 0;
  color: var(--text2);
  display: flex;
  gap: 8px;
  align-items: flex-start;
  line-height: 1.4;
}
.plan-step.completed { color: var(--green); }
.plan-step.in_progress { color: var(--orange); }
.plan-step.failed { color: var(--red); }

.stats {
  font-size: 11.5px;
  color: var(--text2);
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-variant-numeric: tabular-nums;
}
.stats > div {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.stats b {
  color: var(--text);
  font-weight: 600;
}

/* Code blocks dentro del bubble del assistant */
.msg-bubble code {
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  border: 1px solid var(--border-light);
}

/* Responsive: en pantallas muy chicas, ocultar paneles laterales */
@media (max-width: 1200px) {
  .panel { display: none; }
}
@media (max-width: 900px) {
  .sidebar { display: none; }
}
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

const COLORS = {
  cora: '#a855f7', forge_c: '#3b82f6', axiom: '#f59e0b',
  muse: '#ec4899', empathy: '#10b981',
};
const RELATION_COLORS = {
  causes: '#ef4444', prevents: '#f97316', enables: '#22c55e',
  leads_to: '#dc2626', implies: '#3b82f6', follows_from: '#60a5fa',
  contradicts: '#a855f7', equivalent: '#9ca3af', supports: '#84cc16',
  weakens: '#92400e', requires: '#06b6d4', precedes: '#ec4899',
  part_of: '#14b8a6', instance_of: '#a16207', correlates: '#eab308',
  analogous_to: '#8b5cf6',
};

// ── App ──────────────────────────────────────────────────────────────

function App() {
  const [info, setInfo] = useState(null);
  const [sessionId, setSessionId] = useState(null);
  const [sessions, setSessions] = useState([]);
  const [messages, setMessages] = useState([]);
  const [scores, setScores] = useState(null);
  const [mem, setMem] = useState({ entries: [], total: 0 });
  const [files, setFiles] = useState([]);
  const [thinking, setThinking] = useState(null);
  const [streaming, setStreaming] = useState(false);
  const [currentTokens, setCurrentTokens] = useState('');
  const [currentMeta, setCurrentMeta] = useState(null);
  const [currentGraph, setCurrentGraph] = useState(null);
  const [currentScratchPad, setCurrentScratchPad] = useState(null);
  const [currentCheck, setCurrentCheck] = useState(null);
  const [currentPlan, setCurrentPlan] = useState(null);
  const [toolLog, setToolLog] = useState([]);
  const [goals, setGoals] = useState({ enabled: false });
  const [cacheStats, setCacheStats] = useState(null);
  const [lifecycle, setLifecycle] = useState({ state: 'idle' });
  const [adapters, setAdapters] = useState({ enabled: false, count: 0, adapters: [] });
  const [trajectory, setTrajectory] = useState(null);
  const [sleepLog, setSleepLog] = useState(null);
  const [sleepRunning, setSleepRunning] = useState(false);
  const wsRef = useRef(null);
  const messagesRef = useRef(null);
  // Refs para evitar stale closures en el ws.onmessage handler
  const pendingMetaRef = useRef(null);
  const pendingGraphRef = useRef(null);
  const pendingScratchPadRef = useRef(null);
  const pendingCheckRef = useRef(null);
  const pendingPlanRef = useRef(null);

  // Initial load + periodic refresh
  useEffect(() => {
    fetch('/api/info').then(r => r.json()).then(setInfo).catch(() => {});
    refreshSessions();
    refreshMem();
    refreshFiles();
    refreshGoals();
    refreshCacheStats();
    refreshLifecycle();
    refreshAdapters();
    refreshSleepLog();
    newChat();
    const interval = setInterval(() => {
      refreshCacheStats();
      refreshLifecycle();
      refreshGoals();
      refreshAdapters();
    }, 5000);
    return () => clearInterval(interval);
  }, []);

  // Auto-scroll
  useEffect(() => {
    if (messagesRef.current) {
      messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
    }
  }, [messages, currentTokens, thinking]);

  const refreshSessions = () => {
    fetch('/api/sessions').then(r => r.json()).then(setSessions).catch(() => {});
  };
  const refreshMem = () => {
    fetch('/api/mem').then(r => r.json()).then(setMem).catch(() => {});
  };
  const refreshFiles = () => {
    fetch('/api/files').then(r => r.json()).then(d => setFiles(d.files || [])).catch(() => {});
  };
  const refreshGoals = () => {
    fetch('/api/goals').then(r => r.json()).then(setGoals).catch(() => {});
  };
  const refreshCacheStats = () => {
    fetch('/api/cache/stats').then(r => r.json()).then(setCacheStats).catch(() => {});
  };
  const refreshLifecycle = () => {
    fetch('/api/lifecycle').then(r => r.json()).then(setLifecycle).catch(() => {});
  };
  const refreshAdapters = () => {
    fetch('/api/adapters').then(r => r.json()).then(setAdapters).catch(() => {});
  };
  const refreshSleepLog = () => {
    fetch('/api/sleep/last').then(r => r.json()).then(setSleepLog).catch(() => {});
  };
  const triggerSleep = async () => {
    setSleepRunning(true);
    try {
      const r = await fetch('/api/sleep', { method: 'POST' });
      const log = await r.json();
      setSleepLog({ enabled: true, last_log: log, buffer_size: 0 });
    } finally {
      setSleepRunning(false);
    }
  };
  const deleteAdapter = async (motor, concept) => {
    if (!confirm(`Delete adapter ${motor}/${concept}?`)) return;
    await fetch(`/api/adapters/${encodeURIComponent(motor)}/${encodeURIComponent(concept)}`, {
      method: 'DELETE',
    });
    refreshAdapters();
  };

  const newChat = async () => {
    const r = await fetch('/api/session', { method: 'POST' });
    const d = await r.json();
    setSessionId(d.session_id);
    setMessages([]);
    setScores(null);
    setThinking(null);
    refreshSessions();
  };

  const loadSession = async (sid) => {
    setSessionId(sid);
    const r = await fetch(`/api/session/${sid}`);
    const turns = await r.json();
    setMessages(turns.map((t, i) => ({
      role: t.role, content: t.content, motor: t.motor,
      scores: t.scores, level: t.level, id: i,
    })));
  };

  const openWebSocket = useCallback((sid) => {
    return new Promise((resolve) => {
      const wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${wsProto}//${window.location.host}/ws/chat/${sid}`);
      ws.onopen = () => { wsRef.current = ws; resolve(ws); };
      ws.onerror = () => { resolve(null); };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'token') {
          setCurrentTokens(prev => prev + msg.payload.text);
        } else if (msg.type === 'meta') {
          // Reactive state for live panels
          setScores(msg.payload.scores);
          setCurrentMeta(msg.payload);
          // Ref para usar al hacer commit del mensaje en done
          pendingMetaRef.current = msg.payload;
        } else if (msg.type === 'thinking') {
          setThinking(msg.payload);
        } else if (msg.type === 'tool') {
          setToolLog(prev => [...prev, msg.payload].slice(-20));
        } else if (msg.type === 'graph') {
          setCurrentGraph(msg.payload);
          pendingGraphRef.current = msg.payload;
        } else if (msg.type === 'scratchpad') {
          setCurrentScratchPad(msg.payload);
          pendingScratchPadRef.current = msg.payload;
        } else if (msg.type === 'check') {
          setCurrentCheck(msg.payload);
          pendingCheckRef.current = msg.payload;
        } else if (msg.type === 'plan') {
          setCurrentPlan(msg.payload);
          pendingPlanRef.current = msg.payload;
        } else if (msg.type === 'done') {
          // Bug fix #2: usar payload del backend (ahora incluye scores+level)
          // y refs para los datos auxiliares — no closures stale
          const finalScores = msg.payload.scores
                             || pendingMetaRef.current?.scores
                             || null;
          const finalLevel  = msg.payload.level
                             || pendingMetaRef.current?.level?.label
                             || null;
          const finalMotor  = msg.payload.motor
                             || pendingMetaRef.current?.motor
                             || null;
          setMessages(prev => [...prev, {
            role:       'assistant',
            content:    msg.payload.response,
            motor:      finalMotor,
            scores:     finalScores,
            level:      finalLevel,
            graph:      msg.payload.graph      || pendingGraphRef.current,
            scratchpad: msg.payload.scratchpad || pendingScratchPadRef.current,
            check:      msg.payload.check      || pendingCheckRef.current,
            plan:       msg.payload.plan       || pendingPlanRef.current,
            id:         prev.length,
          }]);
          // Cleanup refs + state
          pendingMetaRef.current = null;
          pendingGraphRef.current = null;
          pendingScratchPadRef.current = null;
          pendingCheckRef.current = null;
          pendingPlanRef.current = null;
          setCurrentTokens('');
          setCurrentMeta(null);
          setCurrentGraph(null);
          setCurrentScratchPad(null);
          setCurrentCheck(null);
          setCurrentPlan(null);
          setThinking(null);
          setStreaming(false);
          refreshSessions();
          refreshMem();
        } else if (msg.type === 'error') {
          setStreaming(false);
          setThinking(null);
        }
      };
    });
  }, [scores, currentMeta]);

  const send = async (text) => {
    if (!text.trim() || streaming) return;
    if (!sessionId) await newChat();
    const userMsg = { role: 'user', content: text, id: messages.length };
    setMessages(prev => [...prev, userMsg]);
    setStreaming(true);
    setCurrentTokens('');
    setThinking(null);
    let ws = wsRef.current;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      ws = await openWebSocket(sessionId);
    }
    if (ws) {
      ws.send(JSON.stringify({ text }));
    } else {
      setStreaming(false);
    }
    // Parte 22.5: pedir la trayectoria en paralelo para mostrar en el panel
    fetch('/api/trajectory/plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: text }),
    }).then(r => r.json()).then(d => {
      if (d && d.enabled) setTrajectory(d);
    }).catch(() => {});
  };

  const uploadFile = async (file) => {
    const fd = new FormData();
    fd.append('file', file);
    await fetch('/api/upload', { method: 'POST', body: fd });
    refreshFiles();
  };

  return (
    <>
      <Sidebar
        info={info}
        sessions={sessions}
        sessionId={sessionId}
        onNewChat={newChat}
        onLoadSession={loadSession}
      />
      <MainArea
        messages={messages}
        currentTokens={currentTokens}
        currentMeta={currentMeta}
        thinking={thinking}
        streaming={streaming}
        onSend={send}
        onUpload={uploadFile}
        messagesRef={messagesRef}
      />
      <RightPanel
        info={info}
        scores={scores}
        mem={mem}
        files={files}
        toolLog={toolLog}
        goals={goals}
        cacheStats={cacheStats}
        lifecycle={lifecycle}
        currentCheck={currentCheck}
        currentScratchPad={currentScratchPad}
        currentPlan={currentPlan}
        adapters={adapters}
        onDeleteAdapter={deleteAdapter}
        trajectory={trajectory}
        sleepLog={sleepLog}
        sleepRunning={sleepRunning}
        onTriggerSleep={triggerSleep}
      />
    </>
  );
}

// ── Sidebar ──────────────────────────────────────────────────────────

function Sidebar({ info, sessions, sessionId, onNewChat, onLoadSession }) {
  return (
    <div className="sidebar">
      <div className="sidebar-header">
        <h1>AION-C</h1>
        <div className="subtitle">
          {info ? `MoSE · 5 motors · ${info.params_human}` : 'loading...'}
        </div>
      </div>
      <button className="new-chat-btn" onClick={onNewChat}>+ New Chat</button>
      <div className="chat-list">
        {sessions.map(s => (
          <div
            key={s.id}
            className={`chat-item ${s.id === sessionId ? 'active' : ''}`}
            onClick={() => onLoadSession(s.id)}
          >
            {s.title} ({s.messages})
          </div>
        ))}
      </div>
      <div className="lifecycle-badge">
        <span><span className="dot"></span>{info?.lifecycle_state || 'idle'}</span>
        <span>{info?.n_sessions || 0} sessions</span>
      </div>
    </div>
  );
}

// ── Main area: messages + input ──────────────────────────────────────

function MainArea({ messages, currentTokens, currentMeta, thinking, streaming, onSend, onUpload, messagesRef }) {
  const [draft, setDraft] = useState('');
  const fileRef = useRef();

  const handleSend = () => {
    if (!draft.trim()) return;
    onSend(draft);
    setDraft('');
  };

  return (
    <div className="main">
      <div className="messages" ref={messagesRef}>
        {messages.map(m => (
          <Message key={m.id} msg={m} />
        ))}
        {thinking && (
          <div className="thinking">
            <span className="dots"><span></span><span></span><span></span></span>
            Thinking ({thinking.label}, {thinking.iterations[0]}-{thinking.iterations[1]} iter)...
          </div>
        )}
        {streaming && currentTokens && (
          <Message msg={{
            role: 'assistant',
            content: currentTokens,
            motor: currentMeta?.motor,
            scores: currentMeta?.scores,
            level: currentMeta?.level?.label,
            id: -1,
            partial: true,
          }} />
        )}
      </div>
      <div className="input-area">
        <div className="input-wrap">
          <input
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSend()}
            placeholder="Type a message... (EN or ES)"
            disabled={streaming}
            autoFocus
          />
          <button className="upload-btn" onClick={() => fileRef.current?.click()}>📎</button>
          <input
            ref={fileRef}
            type="file"
            style={{ display: 'none' }}
            onChange={e => e.target.files?.[0] && onUpload(e.target.files[0])}
          />
          <button onClick={handleSend} disabled={streaming || !draft.trim()}>Send</button>
        </div>
      </div>
    </div>
  );
}

// ── Message ──────────────────────────────────────────────────────────

function Message({ msg }) {
  const [graphOpen, setGraphOpen] = useState(false);
  const graphRef = useRef();
  const networkRef = useRef();

  useEffect(() => {
    if (graphOpen && graphRef.current && msg.graph && !networkRef.current) {
      const nodes = new vis.DataSet((msg.graph.nodes || []).map(n => ({
        id: n.id, label: n.label || n.id,
        color: { background: '#1e1e32', border: '#a855f7' },
        font: { color: '#e2e8f0', size: 13 },
      })));
      const edges = new vis.DataSet((msg.graph.edges || []).map((e, i) => ({
        id: 'e' + i, from: e.source, to: e.target, label: e.relation,
        color: { color: RELATION_COLORS[e.relation] || '#64748b' },
        font: { color: RELATION_COLORS[e.relation] || '#64748b', size: 10 },
        arrows: 'to',
      })));
      networkRef.current = new vis.Network(graphRef.current, { nodes, edges }, {
        physics: { solver: 'forceAtlas2Based', stabilization: { iterations: 100 } },
        interaction: { dragNodes: true, dragView: true, zoomView: true },
      });
    }
  }, [graphOpen, msg.graph]);

  const motorColor = COLORS[msg.motor] || '#6b7280';
  const isAssistant = msg.role === 'assistant';
  const hasGraph = isAssistant && msg.graph && msg.graph.nodes && msg.graph.nodes.length > 0;
  // Score del motor activo en este mensaje específico (no el global del panel)
  const motorScore = msg.scores && msg.motor ? msg.scores[msg.motor] : null;

  return (
    <div className={`msg ${msg.role}`}>
      <div className="msg-bubble">{msg.content || (msg.partial ? '…' : '')}</div>
      {isAssistant && msg.motor && (
        <div className="msg-meta">
          <span className="motor-badge" style={{ background: motorColor }}>
            {msg.motor}{motorScore !== null && motorScore !== undefined ? ` ${Math.round(motorScore * 100)}%` : ''}
          </span>
          {msg.level && <span className="level-badge">{msg.level}</span>}
          {msg.check && msg.check.confidence !== null && msg.check.confidence !== undefined && (
            <span className="level-badge" title="confidence">conf {Math.round(msg.check.confidence * 100)}%</span>
          )}
          <FeedbackButtons motor={msg.motor} />
        </div>
      )}
      {hasGraph && (
        <div className={`graph-card ${graphOpen ? 'open' : ''}`}>
          <div className="graph-card-header" onClick={() => setGraphOpen(!graphOpen)}>
            <span><span className="arrow">▶</span> Causal Graph ({msg.graph.nodes.length} nodes)</span>
          </div>
          <div className="graph-card-body" ref={graphRef}></div>
        </div>
      )}
    </div>
  );
}

// ── Feedback buttons (Parte 25) ─────────────────────────────────────
function FeedbackButtons({ motor, adapter }) {
  const [sent, setSent] = useState(null);  // 'up' | 'down' | null
  const send = async (vote) => {
    if (sent) return;
    setSent(vote);
    try {
      await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vote, motor, adapter }),
      });
    } catch (_) {
      setSent(null);
    }
  };
  const btn = (vote, symbol, title) => (
    <button
      key={vote}
      onClick={() => send(vote)}
      disabled={sent !== null}
      title={title}
      style={{
        background: sent === vote ? 'var(--purple)' : 'transparent',
        border: '1px solid var(--text2)',
        color: sent === vote ? 'white' : 'var(--text2)',
        padding: '1px 6px', fontSize: 11,
        borderRadius: 3, marginLeft: 4,
        cursor: sent ? 'default' : 'pointer',
      }}
    >{symbol}</button>
  );
  return (
    <span style={{ marginLeft: 4 }}>
      {btn('up', '👍', 'helpful')}
      {btn('down', '👎', 'not helpful')}
    </span>
  );
}

// ── Right panel ──────────────────────────────────────────────────────

function RightPanel({ info, scores, mem, files, toolLog, goals, cacheStats, lifecycle, currentCheck, currentScratchPad, currentPlan, adapters, onDeleteAdapter, trajectory, sleepLog, sleepRunning, onTriggerSleep }) {
  return (
    <div className="panel">
      {/* Routing scores */}
      <div className="panel-section">
        <h3>Routing Scores</h3>
        {scores ? (
          ['cora', 'forge_c', 'axiom', 'muse', 'empathy'].map(name => {
            const v = scores[name] || 0;
            return (
              <div key={name} className="score-bar">
                <span className="name">{name}</span>
                <div className="bar-bg">
                  <div className="bar-fill" style={{ width: `${v * 100}%`, background: COLORS[name] }}></div>
                </div>
                <span className="val">{Math.round(v * 100)}%</span>
              </div>
            );
          })
        ) : (
          <p style={{ fontSize: 11, color: 'var(--text2)' }}>Send a message to see routing</p>
        )}
      </div>

      {/* Confidence (Punto 5) */}
      {currentCheck && (
        <div className="panel-section">
          <h3>Confidence</h3>
          <div className="stats">
            <div>level <b>{currentCheck.level || 'unknown'}</b></div>
            <div>policy <b>{currentCheck.policy}</b></div>
            <div>passed <b>{currentCheck.passed ? 'yes' : 'no'}</b></div>
            {currentCheck.confidence !== null && currentCheck.confidence !== undefined && (
              <div>conf <b>{(currentCheck.confidence * 100).toFixed(0)}%</b></div>
            )}
          </div>
        </div>
      )}

      {/* Scratch pad / world model (Punto 12) */}
      {currentScratchPad && (
        <div className="panel-section">
          <h3>Scratch Pad ({currentScratchPad.motor})</h3>
          <div className="stats">
            <div>coherent <b>{currentScratchPad.coherent ? 'yes' : 'no'}</b></div>
            <div>iterations <b>{currentScratchPad.iterations}</b></div>
          </div>
          {currentScratchPad.scratchpad && currentScratchPad.scratchpad.slots && (
            <div style={{ fontSize: 10, color: 'var(--text2)', marginTop: 6 }}>
              {Object.entries(currentScratchPad.scratchpad.slots).slice(0, 4).map(([k, v]) => (
                <div key={k}><b style={{ color: 'var(--purple)' }}>{k}</b>: {String(v).slice(0, 50)}</div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Plan view (Punto 11 / 12.6) */}
      {currentPlan && currentPlan.steps && (
        <div className="panel-section">
          <h3>Plan</h3>
          <div style={{ fontSize: 11, color: 'var(--text2)' }}>{currentPlan.task}</div>
          {currentPlan.steps.map((s, i) => (
            <div key={i} className={`plan-step ${s.status}`}>
              {s.status === 'completed' ? '☑' : s.status === 'in_progress' ? '▶' : s.status === 'failed' ? '✗' : '☐'} Step {s.id}: {s.description}
            </div>
          ))}
        </div>
      )}

      {/* Memory */}
      <div className="panel-section">
        <h3>Memory ({mem.total})</h3>
        {(mem.entries || []).slice(0, 5).map((e, i) => (
          <div key={i} className="mem-entry">
            <span className="key">{e.key || `m${i}`}</span> {(e.value || '').slice(0, 50)}
          </div>
        ))}
      </div>

      {/* Tool log */}
      <div className="panel-section">
        <h3>Tool Log</h3>
        {toolLog.length === 0 ? (
          <p style={{ fontSize: 11, color: 'var(--text2)' }}>No tool calls yet</p>
        ) : (
          toolLog.slice(-6).map((t, i) => (
            <div key={i} className="tool-log-entry">
              <span className="action">{t.action || 'tool'}</span> {t.summary || ''}
            </div>
          ))
        )}
      </div>

      {/* Goals (Punto 15 / Parte 17) */}
      {goals.enabled && (
        <div className="panel-section">
          <h3>Goals & Tasks</h3>
          <div style={{ fontSize: 10, color: 'var(--text2)', marginBottom: 8, fontStyle: 'italic' }}>
            mission: {goals.permanent_mission}
          </div>
          {(goals.active_missions || []).slice(0, 3).map((m, i) => (
            <div key={'m' + i} className="plan-step in_progress">▶ {m.title}</div>
          ))}
          {(goals.active_goals || []).slice(0, 3).map((g, i) => (
            <div key={'g' + i} className="plan-step">🎯 {g.title}</div>
          ))}
          {(goals.proposed_goals || []).slice(0, 2).map((g, i) => (
            <div key={'p' + i} className="plan-step" style={{ color: 'var(--orange)' }}>? {g.title} (proposed)</div>
          ))}
          {(goals.pending_tasks || []).slice(0, 3).map((t, i) => (
            <div key={'t' + i} className="plan-step">☐ {t.title}</div>
          ))}
        </div>
      )}

      {/* Sleep Cycle (Parte 23) */}
      {sleepLog && sleepLog.enabled && (
        <div className="panel-section">
          <h3>Sleep Cycle</h3>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: 'var(--text2)' }}>
              buffer: {sleepLog.buffer_size || 0}
            </span>
            <button
              onClick={onTriggerSleep}
              disabled={sleepRunning}
              style={{
                background: sleepRunning ? 'var(--text2)' : 'var(--purple)',
                color: 'white', border: 'none', padding: '3px 10px',
                borderRadius: 3, cursor: sleepRunning ? 'wait' : 'pointer',
                fontSize: 11,
              }}
            >{sleepRunning ? '…' : '💤 sleep now'}</button>
          </div>
          {sleepLog.last_log && (
            <div>
              <div style={{ fontSize: 10, color: 'var(--text2)', marginBottom: 4 }}>
                last: {sleepLog.last_log.episodes_processed} eps · {sleepLog.last_log.duration_ms.toFixed(0)}ms · trigger={sleepLog.last_log.trigger}
              </div>
              {sleepLog.last_log.phases.map((p, i) => (
                <div key={i} style={{ fontSize: 10, marginTop: 2 }}>
                  <span style={{ color: 'var(--orange)', fontWeight: 600 }}>{i+1}.</span>
                  {' '}
                  <span style={{ color: 'var(--text1)' }}>{p.name}</span>
                  {' — '}
                  <span style={{ color: 'var(--text2)' }}>{p.summary}</span>
                </div>
              ))}
            </div>
          )}
          {!sleepLog.last_log && (
            <div style={{ fontSize: 11, color: 'var(--text2)', fontStyle: 'italic' }}>
              no sleep yet — trigger manually or wait for inactivity
            </div>
          )}
        </div>
      )}

      {/* Trajectory (Parte 22.5) */}
      {trajectory && trajectory.motor_sequence && trajectory.motor_sequence.length > 0 && (
        <div className="panel-section">
          <h3>Trajectory</h3>
          <div style={{ fontSize: 10, color: 'var(--text2)', marginBottom: 6, fontStyle: 'italic' }}>
            {trajectory.rationale}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' }}>
            {trajectory.motor_sequence.map((m, i) => (
              <React.Fragment key={i}>
                <span style={{
                  background: 'var(--purple)', color: 'white', padding: '3px 8px',
                  borderRadius: 10, fontSize: 11, fontWeight: 600,
                }}>{m}</span>
                {i < trajectory.motor_sequence.length - 1 && (
                  <span style={{ color: 'var(--text2)' }}>→</span>
                )}
              </React.Fragment>
            ))}
            <span style={{ color: 'var(--text2)' }}>→</span>
            <span style={{
              background: 'var(--orange)', color: 'white', padding: '3px 8px',
              borderRadius: 10, fontSize: 11, fontWeight: 600,
            }}>unifier</span>
          </div>
          <div style={{ marginTop: 6 }}>
            {trajectory.steps && trajectory.steps.map((s, i) => (
              <div key={i} style={{ fontSize: 10, color: 'var(--text2)', marginTop: 2 }}>
                {i+1}. <b style={{ color: 'var(--text1)' }}>{s.motor_name}</b>: {s.sub_goal}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Adapters (Parte 22) */}
      {adapters && adapters.enabled && (
        <div className="panel-section">
          <h3>Adapters ({adapters.count})</h3>
          <div style={{ fontSize: 10, color: 'var(--text2)', marginBottom: 6 }}>
            total: {((adapters.total_bytes || 0) / 1024).toFixed(1)} KB
          </div>
          {adapters.count === 0 && (
            <div style={{ fontSize: 11, color: 'var(--text2)', fontStyle: 'italic' }}>
              no adapters yet — learn a concept to grow
            </div>
          )}
          {(adapters.adapters || []).map((a, i) => (
            <div key={i} className="mem-entry" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600 }}>
                  <span style={{ color: 'var(--purple)' }}>{a.motor}</span>
                  {' / '}
                  {a.concept}
                </div>
                <div style={{ fontSize: 9, color: 'var(--text2)' }}>
                  r={a.rank} · {(a.size_bytes / 1024).toFixed(1)}KB · reward={a.reward_score.toFixed(2)} · uses={a.usage_count}
                </div>
                {a.tags && a.tags.length > 0 && (
                  <div style={{ fontSize: 9, color: 'var(--orange)' }}>
                    {a.tags.join(', ')}
                  </div>
                )}
              </div>
              <button
                onClick={() => onDeleteAdapter(a.motor, a.concept)}
                style={{
                  background: 'transparent', border: '1px solid var(--text2)',
                  color: 'var(--text2)', cursor: 'pointer', padding: '2px 6px',
                  fontSize: 10, borderRadius: 3, marginLeft: 6,
                }}
                title="Delete adapter"
              >×</button>
            </div>
          ))}
        </div>
      )}

      {/* Files */}
      <div className="panel-section">
        <h3>Files ({files.length})</h3>
        {files.slice(0, 5).map((f, i) => (
          <div key={i} className="mem-entry">
            <a href={`/api/download/${encodeURIComponent(f.name)}`} style={{ color: 'var(--purple)' }}>{f.name}</a>
            <span style={{ float: 'right', fontSize: 9 }}>{f.bytes} B</span>
          </div>
        ))}
      </div>

      {/* Cache stats (Punto 6) */}
      {cacheStats && cacheStats.enabled && (
        <div className="panel-section">
          <h3>Cache</h3>
          <div className="stats">
            <div>size <b>{cacheStats.size}/{cacheStats.max_size}</b></div>
            <div>hits <b>{cacheStats.hits}</b></div>
            <div>misses <b>{cacheStats.misses}</b></div>
            <div>hit rate <b>{(cacheStats.hit_rate * 100).toFixed(0)}%</b></div>
          </div>
        </div>
      )}

      {/* System / lifecycle (Punto 7) */}
      <div className="panel-section">
        <h3>System</h3>
        <div className="stats">
          <div>state <b>{lifecycle?.current_state || 'idle'}</b></div>
          <div>params <b>{info?.params_human || '?'}</b></div>
          <div>motors <b>{info?.motors?.length || 0}</b></div>
          <div>sessions <b>{info?.n_sessions || 0}</b></div>
          {lifecycle?.history_length !== undefined && (
            <div>transitions <b>{lifecycle.history_length}</b></div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
